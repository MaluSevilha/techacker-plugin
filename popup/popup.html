<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Privacy Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e0e0e0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      background: #161b22;
      border-bottom: 1px solid #2a2f3a;
    }
    .header-title { font-size: 15px; font-weight: 700; color: #fff; }
    .header-url {
      font-size: 11px; color: #8b949e;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 300px;
    }

    /* Score */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #2a2f3a;
    }
    .score-circle {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800;
      border: 3px solid;
      flex-shrink: 0;
    }
    .score-info { flex: 1; }
    .score-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .score-track { background: #2a2f3a; border-radius: 4px; height: 6px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

    /* Tabs */
    .tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #2a2f3a;
      overflow-x: auto;
    }
    .tab {
      flex: 1; padding: 8px 4px;
      text-align: center; font-size: 11px; font-weight: 500; color: #8b949e;
      cursor: pointer; border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .tab .badge {
      display: inline-block; background: #da3633; color: #fff;
      border-radius: 8px; padding: 0 5px; font-size: 10px; margin-left: 3px;
      line-height: 14px;
    }
    .tab .badge.ok { background: #238636; }

    /* Panels */
    .panel { display: none; padding: 12px 16px; max-height: 340px; overflow-y: auto; }
    .panel.active { display: block; }

    /* Section */
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #8b949e; margin: 10px 0 6px;
    }
    .section-title:first-child { margin-top: 0; }

    /* Items */
    .item {
      background: #161b22; border: 1px solid #2a2f3a;
      border-radius: 6px; padding: 8px 10px; margin-bottom: 5px;
    }
    .item-domain { font-weight: 600; color: #58a6ff; font-size: 12px; }
    .item-meta { color: #8b949e; font-size: 11px; margin-top: 2px; }
    .item-tag {
      display: inline-block; border-radius: 4px; padding: 1px 6px;
      font-size: 10px; font-weight: 600; margin-right: 3px; margin-top: 3px;
    }
    .tag-red { background: #3d1c1c; color: #f85149; border: 1px solid #6f2020; }
    .tag-yellow { background: #3d2e1c; color: #f0883e; border: 1px solid #6f4820; }
    .tag-green { background: #1c3d1c; color: #56d364; border: 1px solid #1f5c1f; }
    .tag-blue { background: #1c2a3d; color: #58a6ff; border: 1px solid #1f3a6f; }

    /* Empty */
    .empty { text-align: center; color: #8b949e; padding: 20px 0; font-size: 12px; }
    .empty-icon { font-size: 28px; display: block; margin-bottom: 6px; }

    /* Penalties list */
    .penalty-item { color: #f85149; font-size: 11px; padding: 2px 0; }

    /* Loading */
    .loading { text-align: center; padding: 30px; color: #8b949e; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">🔍 Privacy Monitor</div>
      <div class="header-url" id="pageUrl">Carregando...</div>
    </div>
  </div>

  <div class="score-bar" id="scoreBar">
    <div class="loading">Analisando página...</div>
  </div>

  <div class="tabs" id="tabBar" style="display:none">
    <div class="tab active" data-panel="panel-tp">Terceiros <span class="badge" id="badge-tp">0</span></div>
    <div class="tab" data-panel="panel-cookies">Cookies <span class="badge" id="badge-ck">0</span></div>
    <div class="tab" data-panel="panel-storage">Storage <span class="badge" id="badge-st">0</span></div>
    <div class="tab" data-panel="panel-fp">Fingerpr. <span class="badge" id="badge-fp">0</span></div>
    <div class="tab" data-panel="panel-hijack">Hijack <span class="badge" id="badge-hj">0</span></div>
  </div>

  <!-- Third-party domains -->
  <div class="panel active" id="panel-tp"></div>
  <!-- Cookies -->
  <div class="panel" id="panel-cookies"></div>
  <!-- Storage -->
  <div class="panel" id="panel-storage"></div>
  <!-- Fingerprinting -->
  <div class="panel" id="panel-fp"></div>
  <!-- Hijacking -->
  <div class="panel" id="panel-hijack"></div>

  <script src="popup.js"></script>
</body>
</html>
